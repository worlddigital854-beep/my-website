<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Free Web Tools</title>
    <script src="https://pl30177250.effectivecpmnetwork.com/e5/f6/28/e5f628835d9dab727aa45b00ec2af2ed.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .box { background: #1e293b; padding: 15px; border-radius: 10px; border: 1px solid #38bdf8; text-align: center; }
        input, textarea { width: 90%; padding: 8px; margin: 5px 0; border-radius: 4px; border: none; }
        button { background: #38bdf8; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1 style="text-align:center;">Professional Web Tools</h1>
    <div class="grid">
        <div class="box"><h3>Text Counter</h3><textarea id="t1" placeholder="Type here..."></textarea><button onclick="alert('Word Count: ' + document.getElementById('t1').value.trim().split(/\s+/).filter(x=>x).length)">Count</button></div>
        
        <div class="box"><h3>BMI Calculator</h3><input id="h" placeholder="Height (m)"><input id="w" placeholder="Weight (kg)"><button onclick="let bmi=(document.getElementById('w').value/(document.getElementById('h').value**2)).toFixed(1); alert('Your BMI: ' + bmi)">Calculate</button></div>
        
        <div class="box"><h3>QR Generator</h3><input id="q1" placeholder="URL"><button onclick="window.open('https://api.qrserver.com/v1/create-qr-code/?data='+document.getElementById('q1').value)">Create QR</button></div>
        
        <div class="box"><h3>Base64 Encoder</h3><input id="b1" placeholder="Text"><button onclick="document.getElementById('b1').value = btoa(document.getElementById('b1').value)">Encode</button></div>
        
        <div class="box"><h3>Password Gen</h3><button onclick="alert('New: ' + Math.random().toString(36).slice(-8))">Generate</button></div>
        
        <div class="box"><h3>Inch to Cm</h3><input id="i1" placeholder="Inches"><button onclick="alert((document.getElementById('i1').value * 2.54).toFixed(2) + ' cm')">Convert</button></div>
        
        <div class="box"><h3>JSON Formatter</h3><textarea id="j1" placeholder="Paste JSON"></textarea><button onclick="try{let o=JSON.parse(document.getElementById('j1').value); document.getElementById('j1').value=JSON.stringify(o,null,4)}catch(e){alert('Invalid JSON')}">Format</button></div>
        
        <div class="box"><h3>CSS Minifier</h3><textarea id="c1" placeholder="Paste CSS"></textarea><button onclick="document.getElementById('c1').value=document.getElementById('c1').value.replace(/\s+/g,' ')">Minify</button></div>
        
        <div class="box"><h3>Age Calculator</h3><input id="y1" placeholder="Birth Year"><button onclick="alert('Your Age: ' + (new Date().getFullYear() - document.getElementById('y1').value))">Check</button></div>
        
        <div class="box"><h3>C to F</h3><input id="f1" placeholder="Celsius"><button onclick="alert((document.getElementById('f1').value * 9/5 + 32).toFixed(1) + ' °F')">Convert</button></div>
    </div>
</body>
</html>
