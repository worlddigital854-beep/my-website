<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Free Web Tools</title>
    <script type="text/javascript" src="https://pl30177250.effectivecpmnetwork.com/e5/f6/28/e5f628835d9dab727aa45b00ec2af2ed.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        /* AI Box को बड़ा करने के लिए */
        .ai-card { background: rgba(56, 189, 248, 0.1); border: 2px solid #38bdf8; grid-column: 1 / -1; padding: 30px; border-radius: 15px; text-align: center; }
        .card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 15px; text-align: center; }
        textarea { width: 95%; height: 100px; padding: 10px; border-radius: 8px; background: #1e293b; color: white; border: none; }
        input { width: 90%; padding: 10px; margin: 5px; border-radius: 8px; border: none; background: #1e293b; color: white; }
        button { padding: 10px 20px; border-radius: 8px; border: none; background: #38bdf8; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1 style="text-align:center;">All Free Web Tools</h1>

    <div class="grid">
        <div class="ai-card">
            <h2>AI Content Detector</h2>
            <textarea id="aiText" placeholder="Paste your content here..."></textarea><br>
            <input type="text" id="apiKey" placeholder="Enter your Google API Key">
            <a href="https://console.cloud.google.com/" target="_blank" style="color:#38bdf8; display:block; margin:10px;">Get API Key</a>
            <button onclick="alert('API Connection Active!')">Analyze Content</button>
        </div>

        <div class="card">
            <h3>Insta Caption</h3>
            <input id="insta" placeholder="Topic (e.g. Travel)">
            <button onclick="alert('Caption: ' + document.getElementById('insta').value + ' vibes only! ✨ #trending #viral #content')">Generate</button>
        </div>

        <div class="card">
            <h3>Keyword Density</h3>
            <input id="keyText" placeholder="Full Text">
            <input id="keyWord" placeholder="Keyword">
            <button onclick="let t=document.getElementById('keyText').value.split(' '); let k=document.getElementById('keyWord').value; alert('Density: ' + ((t.filter(w=>w.toLowerCase()==k.toLowerCase()).length/t.length)*100).toFixed(1) + '%')">Check</button>
        </div>
        
        </div>
</body>
</html>
