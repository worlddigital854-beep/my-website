<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Free Web Tools</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 100px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>All Free Web Tools</h1>

        <div class="card">
            <h3>Text Counter</h3>
            <textarea id="textInput" oninput="countText()" placeholder="Type here..."></textarea>
            <p>Words: <span id="wordCount">0</span> | Characters: <span id="charCount">0</span></p>
        </div>

        <div class="card">
            <h3>Password Generator</h3>
            <button onclick="generatePassword()">Generate Password</button>
            <p id="passwordOutput" style="font-weight:bold; color:blue;"></p>
        </div>
    </div>

    <script>
        // Text Counter Logic
        function countText() {
            let text = document.getElementById("textInput").value;
            let words = text.trim().split(/\s+/).filter(item => item);
            document.getElementById("wordCount").innerText = words.length;
            document.getElementById("charCount").innerText = text.length;
        }

        // Password Generator Logic
        function generatePassword() {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";
            let pass = "";
            for (let i = 0; i < 12; i++) {
                pass += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById("passwordOutput").innerText = pass;
        }
    </script>
</body>
</html>
