<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Free Web Tools</title>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid #38bdf8; padding: 15px; border-radius: 12px; text-align: center; }
        input, textarea { width: 90%; padding: 8px; margin: 5px 0; border-radius: 5px; border: none; background: #1e293b; color: white; }
        button { padding: 8px 15px; border-radius: 5px; border: none; background: #38bdf8; color: black; font-weight: bold; cursor: pointer; }
        .res { margin-top: 10px; font-weight: bold; color: #38bdf8; min-height: 20px; }
    </style>
</head>
<body>
    <h1 style="text-align:center;">All Free Web Tools</h1>
    <div class="grid" id="toolGrid">
        <div class="card"><h3>Typing Test</h3><input id="inType" placeholder="Type: fast"><button onclick="document.getElementById('rType').innerText = (document.getElementById('inType').value === 'fast') ? 'Correct!' : 'Try Again'">Check</button><div id="rType" class="res"></div></div>
        <div class="card"><h3>Base64</h3><input id="inB64" placeholder="Text"><button onclick="document.getElementById('rB64').innerText = btoa(document.getElementById('inB64').value)">Encode</button><div id="rB64" class="res"></div></div>
        <div class="card"><h3>PDF Converter</h3><p>Convert docs to PDF</p><button onclick="window.open('https://online2pdf.com/')">Open</button></div>
        <div class="card"><h3>Insta Caption</h3><input id="inCap" placeholder="Topic"><button onclick="document.getElementById('rCap').innerText = '🔥 Trending ' + document.getElementById('inCap').value + ' vibes!'">Generate</button><div id="rCap" class="res"></div></div>
        <div class="card"><h3>Sugar Check</h3><input type="number" id="inSug" placeholder="mg/dL"><button onclick="document.getElementById('rSug').innerText = (document.getElementById('inSug').value < 140) ? 'Normal' : 'High'">Check</button><div id="rSug" class="res"></div></div>
        <div class="card"><h3>BMI</h3><input type="number" id="inH" placeholder="cm"><input type="number" id="inW" placeholder="kg"><button onclick="let h=document.getElementById('inH').value/100; document.getElementById('rBMI').innerText = 'BMI: '+(document.getElementById('inW').value/(h*h)).toFixed(1)">Calc</button><div id="rBMI" class="res"></div></div>
        <div class="card"><h3>QR Code</h3><input id="inQR" placeholder="URL"><button onclick="document.getElementById('rQR').innerHTML = '<img src=\'https://api.qrserver.com/v1/create-qr-code/?size=100x100&data='+document.getElementById('inQR').value+'\'>'">Create</button><div id="rQR" class="res"></div></div>
        <div class="card"><h3>Password</h3><button onclick="document.getElementById('rPass').innerText = Math.random().toString(36).slice(-8)">Gen</button><div id="rPass" class="res"></div></div>
        <div class="card"><h3>Age</h3><input id="inAge" placeholder="Birth Year"><button onclick="document.getElementById('rAge').innerText = 'Age: '+(2026-document.getElementById('inAge').value)">Check</button><div id="rAge" class="res"></div></div>
        <div class="card"><h3>Hashtag</h3><input id="inHash" placeholder="Topic"><button onclick="document.getElementById('rHash').innerText = '#'+document.getElementById('inHash').value+' #fyp #viral'">Gen</button><div id="rHash" class="res"></div></div>
    </div>
    
    <div style="margin: 40px auto; max-width: 600px; padding: 20px; border: 2px solid #38bdf8;">
        <h3>AI Content Suite</h3>
        <input type="password" id="userApiKey" placeholder="API Key">
        <input type="text" id="topicInput" placeholder="Topic">
        <button onclick="handleAI()">Generate</button>
        <div id="resultOutput" class="res"></div>
    </div>

    <script>
    async function handleAI() {
        const topic = document.getElementById('topicInput').value;
        const key = document.getElementById('userApiKey').value;
        const resBox = document.getElementById('resultOutput');
        if(!key) { resBox.innerText = "Enter API Key!"; return; }
        resBox.innerText = "Generating...";
        try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({contents: [{parts: [{text: "Write about: " + topic}]}]})
            });
            const d = await r.json();
            resBox.innerText = d.candidates[0].content.parts[0].text;
        } catch(e) { resBox.innerText = "Error!"; }
    }
    </script>
</body>
</html>
