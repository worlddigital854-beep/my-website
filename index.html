<div class="box" style="background:#1e293b; padding:20px; border-radius:10px; border:1px solid #38bdf8; color:white; width: 300px;">
    <h3>BMI Calculator</h3>
    <input type="number" id="height" placeholder="Height (cm)" style="width:90%; margin-bottom:10px;">
    <input type="number" id="weight" placeholder="Weight (kg)" style="width:90%; margin-bottom:10px;">
    <button onclick="calculateBMI()" style="background:#38bdf8; border:none; padding:10px; width:100%; cursor:pointer;">Calculate</button>
    <p id="bmiResult" style="margin-top:15px; font-weight:bold; color:#38bdf8;"></p>
</div>

<script>
function calculateBMI() {
    let h = document.getElementById('height').value / 100; // cm to m
    let w = document.getElementById('weight').value;
    if (h > 0 && w > 0) {
        let bmi = (w / (h * h)).toFixed(1);
        document.getElementById('bmiResult').innerText = "Your BMI is: " + bmi;
    } else {
        document.getElementById('bmiResult').innerText = "Please enter valid values!";
    }
}
</script>
