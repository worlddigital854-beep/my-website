<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Free Web Tools</title>
    <script type="text/javascript" src="https://pl30177250.effectivecpmnetwork.com/e5/f6/28/e5f628835d9dab727aa45b00ec2af2ed.js"></script>
    <style>
        body { background: #0f172a; color: white; text-align: center; font-family: sans-serif; }
        .tool-box { border: 2px solid #38bdf8; padding: 20px; margin: 10px; display: inline-block; width: 250px; border-radius: 10px; }
        button { background: #38bdf8; padding: 10px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>All Free Web Tools</h1>

    <div class="tool-box">
        <h3>BMI Calculator</h3>
        <input id="h" placeholder="Height(m)"> <input id="w" placeholder="Weight(kg)">
        <button onclick="let b=(document.getElementById('w').value/(document.getElementById('h').value**2)).toFixed(1); alert('BMI: '+b)">Calculate</button>
    </div>

    <div class="tool-box">
        <h3>QR Generator</h3>
        <input id="q" placeholder="Enter URL">
        <button onclick="window.open('https://api.qrserver.com/v1/create-qr-code/?data='+document.getElementById('q').value)">Generate</button>
    </div>

    <script>
        // یہاں ایک کلک لسنر لگایا ہے تاکہ ایڈز لوڈ ہوں
        document.addEventListener('click', function() {
            console.log("User interacted - Ads should trigger");
        });
    </script>
</body>
</html>
