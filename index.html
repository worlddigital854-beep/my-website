<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Free Web Tools</title>
    <script type="text/javascript" src="https://pl30177250.effectivecpmnetwork.com/e5/f6/28/e5f628835d9dab727aa45b00ec2af2ed.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        /* Grid Layout: यह लैपटॉप पर एक साथ दिखाएगा */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 15px; text-align: center; }
        input, textarea { width: 90%; padding: 10px; margin: 10px 0; border-radius: 8px; border: none; background: rgba(255, 255, 255, 0.1); color: white; }
        button { width: 100%; padding: 10px; border-radius: 8px; border: none; background: #38bdf8; color: black; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h1 style="text-align:center;">All Free Web Tools</h1>
    <div class="grid-container">

        <div class="glass-card">
            <h3>BMI Calculator</h3>
            <input type="number" id="h" placeholder="Height(cm)">
            <input type="number" id="w" placeholder="Weight(kg)">
            <button onclick="let h=document.getElementById('h').value/100; let w=document.getElementById('w').value; alert('BMI: '+(w/(h*h)).toFixed(1))">Calculate</button>
        </div>

        <div class="glass-card">
            <h3>QR Generator</h3>
            <input type="text" id="qText" placeholder="Enter URL">
            <button onclick="document.getElementById('qrRes').innerHTML='<img src=\'https://api.qrserver.com/v1/create-qr-code/?size=100x100&data='+document.getElementById('qText').value+'\'>'">Create</button>
            <div id="qrRes" style="margin-top:10px;"></div>
        </div>

        <div class="glass-card">
            <h3>Text Counter</h3>
            <textarea id="tArea" placeholder="Type here..."></textarea>
            <button onclick="let txt=document.getElementById('tArea').value.trim(); alert('Words: ' + (txt === '' ? 0 : txt.split(/\s+/).length))">Count Words</button>
        </div>

        <div class="glass-card">
            <h3>Password Gen</h3>
            <button onclick="alert('Password: ' + Math.random().toString(36).slice(-10))">Generate</button>
        </div>

    </div>
</body>
</html>
