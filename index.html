<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Free Web Tools</title>
    
    <script type="text/javascript" src="https://pl30177250.effectivecpmnetwork.com/e5/f6/28/e5f628835d9dab727aa45b00ec2af2ed.js"></script>
    
    <style>
        body { background: linear-gradient(135deg, #0f172a, #1e293b); min-height: 100vh; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 25px; border-radius: 20px; width: 300px; text-align: center; margin-bottom: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.37); }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: rgba(255, 255, 255, 0.1); color: white; }
        button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: linear-gradient(45deg, #38bdf8, #818cf8); color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h1>All Free Web Tools</h1>

    <div class="glass-card">
        <h3>BMI Calculator</h3>
        <input type="number" id="h" placeholder="Height (cm)">
        <input type="number" id="w" placeholder="Weight (kg)">
        <button onclick="calcBMI()">Calculate</button>
        <p id="resBMI"></p>
    </div>

    <div class="glass-card">
        <h3>QR Generator</h3>
        <input type="text" id="qText" placeholder="Enter URL">
        <button onclick="genQR()">Generate</button>
        <div id="resQR" style="margin-top:10px;"></div>
    </div>

    <script type="text/javascript" data-cfasync="false" src="//pl30177250.effectivecpmnetwork.com/e5/f6/28/e5f628835d9dab727aa45b00ec2af2ed.js"></script>

    <script>
        function calcBMI() {
            let h = document.getElementById('h').value/100;
            let w = document.getElementById('w').value;
            document.getElementById('resBMI').innerText = (w/(h*h)).toFixed(1);
        }
        function genQR() {
            let t = document.getElementById('qText').value;
            document.getElementById('resQR').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${t}">`;
        }
    </script>
</body>
</html>
